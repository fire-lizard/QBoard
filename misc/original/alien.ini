#	JUMP    =  4,         //jump one step along a direction
#       RIDE    =  8,         //ride along a direction
#	DOUBLE1 = 16,  	      //2nd rank double pawn move slide
#	DOUBLE2 = 32,         //2nd rank double pawn move jump
#       LEAPCAP = 64,         //Long leap over opponent pieces to capture (checkers type)
#       WITHDRAWCAP   = 128   //moves like withdrawer in ultima (does both caps & noncaps)
#       COORDINATECAP = 256   //moves like coordinater in ultima (does both caps & noncaps)
#       IMMOBLIZER = 512      //moves like immoblizer in ultima (no caps)
#       PINCHINGCAP = 1024    //moves like pinching pawn in ultima
#       CHAMELEONCAP = 2048   //moves like chameleon in ultima
